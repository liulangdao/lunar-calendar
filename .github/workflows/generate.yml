name: Generate Lunar Calendar

on:
  schedule:
    # Run daily at 16:00 UTC (which is 00:00 Beijing Time / Asia/Shanghai)
    - cron: '0 16 * * *'
  push:
    branches:
      - main
    paths:
      - 'generate_calendar.py'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run calendar generator
        run: python generate_calendar.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add lunar_huangli.ics
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update lunar calendar [skip ci]"
            git push
          fi
